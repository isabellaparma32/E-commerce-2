<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Fogo da Fé</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <h1 id="titulo">Cadastro - Fogo da Fé</h1>

    <div class="cadastro">
        <form>
            <input type="text" id="nome" placeholder="Digite seu nome completo">
            <input type="email" id="email" placeholder="Digite seu e-mail">
            <input type="password" id="senha" placeholder="Digite sua senha">
        
            <div class="botoes">
                <button type="button" id="btnPrincipal" class="button" onclick="acaoPrincipal()">
                    Criar conta
                </button>

                <a href="#" id="linkModo" class="button secundario" onclick="trocarModo()">
                    Já tenho uma conta
                </a>
            </div>
        </form>
    </div>

    <script src="index.js"></script>
</body>
</html>
